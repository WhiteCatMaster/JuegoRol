<div id="ContenedorPrincipal">
  <div id="ContenedorIzquierda">
    <div class="wrapper">   
      <div class="step" [class.active]="paso === 1" [class.completed]="paso > 1">
        <div class="v-stepper">
          <div class="circle"></div>
          <div class="line"></div>
        </div>
      <div class="content">Nombre de la partida</div>
    </div>

    <div class="step" [class.active]="paso === 2" [class.completed]="paso > 2">
      <div class="v-stepper">
        <div class="circle"></div>
        <div class="line"></div>
      </div>
      <div class="content">Estadísticas</div>
    </div>

    <div class="step" [class.active]="paso === 3" [class.completed]="paso > 3">
      <div class="v-stepper">
        <div class="circle"></div>
        <div class="line"></div>
      </div>
      <div class="content">Ataques</div>
    </div>

    <div class="step" [class.active]="paso === 4" [class.completed]="paso > 4">
      <div class="v-stepper">
        <div class="circle"></div>
        <div class="line"></div>
      </div>
      <div class="content">Personajes</div>
    </div>
  </div>
</div>
  
<div id="ContenedorDerecha">
  <div class="Contenedor1" [hidden]="paso !== 1">
    <h3>NOMBRE DE LA PARTIDA</h3>
    <div class="ClaseGeneralEstadisticas">
    <input class="CajaTexto" type="text" [(ngModel)]="nombre">
    <div data-bind="css: css.footer" class="sv_nav">
    </div>
  </div>
  <input type="button" value="Siguiente" class="sv_next_btn" (click)="irSiguiente()">
  </div>

  <div class="Contenedor1" [hidden]="paso !== 2">
    <h3>ESTADISTICAS</h3>
    <!-- Lo de ngFor es para duplicar la caja -->
    <div class="ClaseGeneralEstadisticas" *ngFor="let caja of estadisticas; let i = index">
      <div>
        <p>Nombre:</p>
        <input class="CajaTexto" type="text" [(ngModel)]="caja.nombre">    
      </div>
      <div>
        <p>Palabra:</p>
        <input class="CajaTexto" type="text" [(ngModel)]="caja.palabra">
      </div>
      <input type="button" value="Eliminar" (click)="eliminarEstadistica(i)">
    </div>

    <input class="BotonAñadir" type="button" value="+" (click)="agregarEstadistica()">
    <br><br>
    <input type="button" value="Atras" class="sv_prev_btn" (click)="irAtras()">
    <input type="button" value="Siguiente" class="sv_next_btn" (click)="irSiguiente()">
  </div>

  <div class="Contenedor1" [hidden]="paso !== 4">
    <h3>PERSONAJES</h3>
    <div class="ClaseGeneralPersonajes" *ngFor="let personaje of personajes; let i = index">
      <div>
        <img class="ImagenPersonaje" src="https://i.pinimg.com/474x/9c/0f/06/9c0f06b14aba220811331c49718d6b93.jpg">
      </div>
      <div>
        <p>Nombre:</p>
        <input class="CajaTexto" type="text" [(ngModel)]="personaje.nombre"> 
      </div>
      
      <div>
        <p>Ataques:</p>
        <div *ngFor="let huecoAtaque of personaje.ataquesDelPersonaje; let j = index; trackBy: trackByFn">    
          <select class="CajaTexto" [(ngModel)]="personaje.ataquesDelPersonaje[j]">
            <option *ngFor="let ataqueCreado of ataques" [value]="ataqueCreado.nombre">
              {{ ataqueCreado.nombre }} (Daño: {{ ataqueCreado.dano }})
            </option>
          </select>
          <input type="button" value="X" (click)="eliminarAtaqueDePersonaje(i, j)">
        </div>
        <input type="button" value="+" (click)="agregarAtaqueAPersonaje(i)">
      </div>
      
      <br>
      <input type="button" value="Eliminar" (click)="eliminarPersonaje(i)">
    </div>

    <input class="BotonAñadir" type="button" value="+" (click)="agregarPersonaje()">
    <br><br>
    <input type="button" value="Atras" class="sv_prev_btn" (click)="irAtras()">
    <input type="button" value="Finalizar" class="sv_next_btn"> 
  </div>

  <div class="Contenedor1" [hidden]="paso !== 3">
    <h3>ATAQUES</h3>
    <div class="ClaseGeneralAtaques" *ngFor="let caja of ataques; let i = index">
      <div>
        <p>Nombre:</p>
        <input class="CajaTexto" type="text" [(ngModel)]="caja.nombre">    
      </div>
      <div>
        <p>Daño:</p>
        <input class="CajaTexto" type="number" [(ngModel)]="caja.dano">
      </div>

      <div>
        <p>Tipo:</p>
        <select class="CajaTexto" [(ngModel)]="caja.tipo">
          <option *ngFor="let tipo of tiposDeAtaque" [value]="tipo">{{ tipo }}</option>
        </select>
      </div>

      <input type="button" value="Eliminar" (click)="eliminarAtaque(i)">
    </div>

    <input class="BotonAñadir" type="button" value="+" (click)="agregarAtaque()">
    <br><br>
    <input type="button" value="Atras" class="sv_prev_btn" (click)="irAtras()">
    <input type="button" value="Siguiente" class="sv_next_btn" (click)="irSiguiente()">
  </div>
